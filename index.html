<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pribadi Interaktif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 15px;
            border: 4px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .content {
            padding: 30px;
        }

        .section-title {
            font-size: 16px;
            color: #4f46e5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 5px;
            margin-top: 20px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            color: #718096;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input, .form-group textarea {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #2d3748;
            background-color: #fff;
            transition: all 0.3s;
        }

        /* Gaya visual saat input dikunci (disabled) */
        .form-group input:disabled, .form-group textarea:disabled {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #475569;
            cursor: not-allowed;
            font-weight: 600;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }

        .btn-save {
            background: #10b981;
            color: white;
        }

        .btn-save:hover {
            background: #059669;
        }

        .btn-unlock {
            background: #f59e0b;
            color: white;
        }

        .btn-unlock:hover {
            background: #d97706;
        }

        .status-badge {
            text-align: center;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-locked {
            background-color: #fee2e2;
            color: #ef4444;
        }

        .status-unlocked {
            background-color: #dcfce7;
            color: #15803d;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #a0aec0;
            background: #f8fafc;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="avatar">👤</div>
        <h1 id="display-nama">Biodata Mandiri</h1>
        <p>Isi data Anda di bawah ini</p>
    </div>

    <div class="content">
        <div id="status-kunci" class="status-badge status-unlocked">🔓 Mode Edit: Silakan Isi Data</div>

        <form id="biodata-form">
            <div class="section-title">Biodata Pribadi</div>
            
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap">
            </div>

            <div class="form-group">
                <label for="ttl">Tempat, Tanggal Lahir</label>
                <input type="text" id="ttl" placeholder="Contoh: Jakarta, 12 Agustus 1995">
            </div>

            <div class="form-group">
                <label for="alamat">Alamat Tinggal</label>
                <textarea id="alamat" rows="2" placeholder="Masukkan alamat lengkap"></textarea>
            </div>

            <div class="section-title">Kontak</div>

            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" placeholder="contoh@email.com">
            </div>

            <div class="form-group">
                <label for="hp">Nomor HP / WhatsApp</label>
                <input type="tel" id="hp" placeholder="08xxxxxxxxxx">
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-save" id="btn-simpan" onclick="kunciDanSimpan()">🔒 Simpan & Kunci</button>
                <button type="button" class="btn btn-unlock" id="btn-buka" onclick="bukaKunci()" style="display: none;">🔓 Buka Kunci</button>
            </div>
        </form>
    </div>

    <div class="footer">
        &copy; 2026 Aplikasi Data Pribadi Terkunci Otomatis.
    </div>
</div>

<script>
    // List id input yang digunakan
    const inputIds = ['nama', 'ttl', 'alamat', 'email', 'hp'];

    // Fungsi saat pertama kali halaman dimuat
    window.onload = function() {
        // Cek apakah ada data yang tersimpan sebelumnya
        inputIds.forEach(id => {
            const savedValue = localStorage.getItem(id);
            if (savedValue) {
                document.getElementById(id).value = savedValue;
            }
        });

        // Cek status apakah terakhir kali dikunci
        const isLocked = localStorage.getItem('isLocked') === 'true';
        if (isLocked) {
            terapkanStatusKunci(true);
        }
    };

    // Fungsi untuk mengunci input dan menyimpan data
    function kunciDanSimpan() {
        // Simpan data ke LocalStorage browser
        inputIds.forEach(id => {
            const value = document.getElementById(id).value;
            localStorage.setItem(id, value);
        });

        localStorage.setItem('isLocked', 'true');
        terapkanStatusKunci(true);
        
        // Update nama di bagian header atas secara berkala
        const namaInput = document.getElementById('nama').value;
        if(namaInput) {
            document.getElementById('display-nama').innerText = namaInput;
        }

        alert("Data berhasil disimpan dan dikunci secara otomatis!");
    }

    // Fungsi untuk membuka kembali kunci input
    function bukaKunci() {
        const konfirmasi = confirm("Apakah Anda yakin ingin membuka kunci untuk mengubah data?");
        if (konfirmasi) {
            localStorage.setItem('isLocked', 'false');
            terapkanStatusKunci(false);
        }
    }

    // Fungsi pembantu untuk mengubah status UI (Terkunci / Terbuka)
    function terapkanStatusKunci(lock) {
        const statusBadge = document.getElementById('status-kunci');
        const btnSimpan = document.getElementById('btn-simpan');
        const btnBuka = document.getElementById('btn-buka');

        inputIds.forEach(id => {
            document.getElementById(id).disabled = lock;
        });

        if (lock) {
            statusBadge.innerText = "🔒 Status: Terkunci Otomatis";
            statusBadge.className = "status-badge status-locked";
            btnSimpan.style.display = "none";
            btnBuka.style.display = "block";
            
            const namaInput = document.getElementById('nama').value;
            if(namaInput) document.getElementById('display-nama').innerText = namaInput;
        } else {
            statusBadge.innerText = "🔓 Mode Edit: Silakan Isi Data";
            statusBadge.className = "status-badge status-unlocked";
            btnSimpan.style.style = "block";
            btnSimpan.style.display = "block";
            btnBuka.style.display = "none";
        }
    }
</script>

</body>
</html>
