<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pribadi - Muhammad Rafi Sofyan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            position: relative;
        }
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            transition: all 0.3s ease;
        }
        .lock-screen.hidden {
            display: none;
        }
        .lock-box {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .lock-box h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .lock-box input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            text-align: center;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn-lock {
            background: #e74c3c;
            width: auto;
            float: right;
        }
        .btn-lock:hover {
            background: #c0392b;
        }
        .header-section {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3498db;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .header-text h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .header-text p {
            color: #7f8c8d;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #34495e;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 15px;
            background-color: #fafafa;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
        }
        .status-bar {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="lockScreen" class="lock-screen">
        <div class="lock-box">
            <h3>Halaman Terkunci</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Masukkan PIN untuk membuka (Default: 1234)</p>
            <input type="password" id="pinInput" placeholder="Masukkan PIN" onkeypress="handleKeyPress(event)">
            <button class="btn" onclick="unlockPage()">Buka Data</button>
            <p id="errorMsg" style="color: red; font-size: 13px; margin-top: 10px; display: none;">PIN Salah!</p>
        </div>
    </div>

    <div class="card">
        <button class="btn btn-lock" onclick="lockPage()">Kunci Halaman</button>
        <div style="clear: both;"></div>

        <div class="header-section">
            <img src="FOTO_ANDA_BASE64_SUDAH_ADA_DI_FILE_ATAS" alt="Foto Muhammad Rafi Sofyan" class="profile-img">
            <div class="header-text">
                <h1>Kumpulan Data Pribadi</h1>
                <p>Data dapat diisi/diedit manual. Terkunci otomatis setelah 5 menit tidak ada aktivitas.</p>
            </div>
        </div>

        <form id="profileForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" value="MUHAMMAD RAFI SOFYAN">
            </div>
            <div class="form-group">
                <label>Tempat, Tanggal Lahir</label>
                <input type="text" value="Permanu pakisaji Malang, 10-07-2008">
            </div>
            <div class="form-group">
                <label>Jenis Kelamin</label>
                <input type="text" value="Laki-Laki">
            </div>
            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea>jalan darmorejo desa Permanu Rt02 Rw03 Kec.Pakisaji Kab.Malang Prov.Jawa Timur</textarea>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="rafisofyan114111@gmail.com">
            </div>
            <div class="form-group">
                <label>No. Telepon</label>
                <input type="text" value="+62 831-5304-1034">
            </div>
            <div class="form-group">
                <label>Keahlian / Fokus</label>
                <input type="text" value="HTML, PUISI, dan DESAIN GRAFIS">
            </div>
        </form>

        <div class="status-bar">
            Auto-lock aktif. Dibuat khusus untuk Muhammad Rafi Sofyan.
        </div>
    </div>

    <script>
        const CORRECT_PIN = "1234"; // Kamu bisa ganti angka '1234' ini dengan PIN buatanmu sendiri
        let inactivityTimer;

        function unlockPage() {
            const pinInput = document.getElementById('pinInput');
            const errorMsg = document.getElementById('errorMsg');
            if (pinInput.value === CORRECT_PIN) {
                document.getElementById('lockScreen').classList.add('hidden');
                errorMsg.style.display = 'none';
                pinInput.value = '';
                resetInactivityTimer();
            } else {
                errorMsg.style.display = 'block';
                pinInput.value = '';
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") unlockPage();
        }

        function lockPage() {
            document.getElementById('lockScreen').classList.remove('hidden');
            clearTimeout(inactivityTimer);
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            // 300000 milidetik = 5 menit
            inactivityTimer = setTimeout(lockPage, 300000); 
        }

        window.onload = function() {
            lockPage(); // Kunci halaman saat pertama kali dimuat
            const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
            activityEvents.forEach(function(name) {
                document.addEventListener(name, function() {
                    if (document.getElementById('lockScreen').classList.contains('hidden')) {
                        resetInactivityTimer();
                    }
                }, true);
            });
        };
    </script>
</body>
</html>
