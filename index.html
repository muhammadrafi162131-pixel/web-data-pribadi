<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pribadi - Muhammad Rafi Sofyan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 auto 15px;
            border: 4px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section-title {
            font-size: 15px;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 5px;
            margin-top: 25px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            color: #718096;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input, .form-group textarea {
            padding: 11px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #2d3748;
            background-color: #fff;
            transition: all 0.3s;
        }

        /* Desain visual saat data terkunci otomatis */
        .form-group input:disabled, .form-group textarea:disabled {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #1e293b;
            cursor: not-allowed;
            font-weight: 600;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }

        .btn-save {
            background: #10b981;
            color: white;
        }

        .btn-save:hover {
            background: #059669;
        }

        .btn-unlock {
            background: #f59e0b;
            color: white;
        }

        .btn-unlock:hover {
            background: #d97706;
        }

        .status-badge {
            text-align: center;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-locked {
            background-color: #fee2e2;
            color: #ef4444;
        }

        .status-unlocked {
            background-color: #dcfce7;
            color: #15803d;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #a0aec0;
            background: #f8fafc;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="avatar">👤</div>
        <h1 id="display-nama">MUHAMMAD RAFI SOFYAN</h1>
        <p id="display-instansi">SMK AL KAAFFAH - palajar</p>
    </div>

    <div class="content">
        <!-- Status Kunci -->
        <div id="status-kunci" class="status-badge status-locked">🔒 Status: Terkunci Otomatis</div>

        <form id="biodata-form">
            <div class="section-title">Biodata Pribadi</div>
            
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" value="MUHAMMAD RAFI SOFYAN" disabled>
            </div>

            <div class="form-group">
                <label for="instansi">Sekolah / Instansi</label>
                <input type="text" id="instansi" value="SMK AL KAAFFAH" disabled>
            </div>

            <div class="form-group">
                <label for="status">Status</label>
                <input type="text" id="status" value="palajar" disabled>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat Lengkap</label>
                <textarea id="alamat" rows="3" disabled>jalan darmorejo desa permanu Rt02 Rw03 Kec.Pakisaji Kab.Malang</textarea>
            </div>

            <div class="section-title">Kontak</div>

            <div class="form-group">
                <label for="hp">Nomor HP / WhatsApp (Utama)</label>
                <input type="tel" id="hp" value="+628315041034" disabled>
            </div>

            <div class="form-group">
                <label for="email">Surel / Email</label>
                <input type="email" id="email" value="muhammad.rafi162131@smk.belajar.id" disabled>
            </div>

            <!-- Tombol Aksi -->
            <div class="button-group">
                <button type="button" class="btn btn-save" id="btn-simpan" onclick="kunciDanSimpan()" style="display: none;">🔒 Simpan & Kunci</button>
                <button type="button" class="btn btn-unlock" id="btn-buka" onclick="bukaKunci()">🔓 Buka Kunci Untuk Edit</button>
            </div>
        </form>
    </div>

    <div class="footer">
        &copy; 2026 E-Portfolio Terkunci | Muhammad Rafi Sofyan.
    </div>
</div>

<script>
    // Id elemen input form
    const inputIds = ['nama', 'instansi', 'status', 'alamat', 'hp', 'email'];

    // Inisialisasi awal saat halaman dibuka
    window.onload = function() {
        // Cek jika user pernah mengubah data di browser ini sebelumnya
        let isSetup = localStorage.getItem('isSetupDone');
        
        if (!isSetup) {
            // Jika pertama kali dibuka, simpan data bawaan gambar ke LocalStorage
            inputIds.forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value);
            });
            localStorage.setItem('isLocked', 'true');
            localStorage.setItem('isSetupDone', 'true');
        } else {
            // Jika sudah ada riwayat modifikasi, muat data dari LocalStorage
            inputIds.forEach(id => {
                const savedValue = localStorage.getItem(id);
                if (savedValue !== null) document.getElementById(id).value = savedValue;
            });
        }

        // Terapkan status kunci terakhir
        const isLocked = localStorage.getItem('isLocked') !== 'false';
        terapkanStatusKunci(isLocked);
    };

    // Fungsi untuk mengunci kembali form dan menyimpan perubahan
    function kunciDanSimpan() {
        inputIds.forEach(id => {
            const value = document.getElementById(id).value;
            localStorage.setItem(id, value);
        });

        localStorage.setItem('isLocked', 'true');
        terapkanStatusKunci(true);
        
        // Perbarui teks header
        document.getElementById('display-nama').innerText = document.getElementById('nama').value;
        document.getElementById('display-instansi').innerText = document.getElementById('instansi').value + " - " + document.getElementById('status').value;

        alert("Perubahan berhasil disimpan dan data kembali terkunci otomatis!");
    }

    // Fungsi membuka kunci agar bisa diisi manual
    function bukaKunci() {
        const konfirmasi = confirm("Apakah Anda ingin membuka kunci untuk mengedit data?");
        if (konfirmasi) {
            localStorage.setItem('isLocked', 'false');
            terapkanStatusKunci(false);
        }
    }

    // Fungsi pengatur UI form (Mengunci / Membuka)
    function terapkanStatusKunci(lock) {
        const statusBadge = document.getElementById('status-kunci');
        const btnSimpan = document.getElementById('btn-simpan');
        const btnBuka = document.getElementById('btn-buka');

        inputIds.forEach(id => {
            document.getElementById(id).disabled = lock;
        });

        if (lock) {
            statusBadge.innerText = "🔒 Status: Terkunci Otomatis";
            statusBadge.className = "status-badge status-locked";
            btnSimpan.style.display = "none";
            btnBuka.style.display = "block";
            
            // Render ulang teks header dari input yang tersimpan
            document.getElementById('display-nama').innerText = document.getElementById('nama').value;
            document.getElementById('display-instansi').innerText = document.getElementById('instansi').value + " - " + document.getElementById('status').value;
        } else {
            statusBadge.innerText = "🔓 Mode Edit: Silakan Isi / Ubah Data";
            statusBadge.className = "status-badge status-unlocked";
            btnSimpan.style.display = "block";
            btnBuka.style.display = "none";
        }
    }
</script>

</body>
</html>
